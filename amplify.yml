version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
        # Remove any Next.js artifacts if they exist
        - rm -rf .next
        # Create deploy-manifest.json for Vite
        - echo '{"version":"1.0","framework":"react","appName":"StockControl","distributionDir":"dist","buildCommand":"npm run build","devCommand":"npm run dev","startCommand":"npm start","ignoreGit":false,"ignoreScripts":false}' > dist/deploy-manifest.json
  artifacts:
    baseDirectory: dist  # This is correct for Vite
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*